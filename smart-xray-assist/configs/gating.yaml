gating:
  stable_dz_dt_threshold_mm_s: 2.0
  stable_variance_threshold: 0.03
  min_stable_duration_ms: 1000
  timeout_ms: 10000
  audio_latency_offset_ms: 1800       # measure per-device; see verification-validation.md
  cough_abort_d2z_threshold_mm_s2: 25.0
  # quality gate for stable detection (camera.md state machine: valid_pixel_ratio > theta_quality)
  min_valid_pixel_ratio: 0.85
  # rolling window (samples) for variance computation
  variance_window: 15
  # camera.md step-7 temporal filter: EMA smoothing on z, dz/dt, and the sample
  # interval suppresses sensor quantization + acquisition jitter that would
  # otherwise blow up the d2Z/dt2 (cough) channel. Lower alpha = heavier smoothing.
  ema_alpha_z: 0.3
  ema_alpha_dz: 0.3
  ema_alpha_dt: 0.2
  # suppress cough abort until the EMA filters converge (~0.3s @30fps)
  warmup_frames: 8
